<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- La etiqueta table se utilize para definir tablas en HTML. Todo el contenido de la tabla, incluidas las
filas y celdas, se coloca dentro de esta etiqueta -->

<!-- La etiqueta tr se utilize para definir una fila en una tabla. Cada fila puede container una o más
celdas, que se definen utilizando las etiquetas td (para celdas de datos) o th (para celdas de encabezado)
-->

<!-- La etique td define una celda de datos dentro de una fila. Cada etiqueta td representa una columna en
la tabla -->

<!-- La etiqueta th define una celda de encabezado dentro de una fila. Cada etiqueta th representa un
encabezado de columna en la tabla -->

<table border="1">
    <tr>
        <th>Nombre</th> 
        <!-- Celda de encabezado para la columna de nombre -->
        <th>Apellido</th>
        <!-- Celda de encabezado para la columna de apellido -->
        <th>Edad</th>
        <!-- Celda de encabezado para la columna de edad -->
    </tr>
    <tr>
        <td>Juan</td>
        <!-- Celda de datos para la columna de nombre -->
        <td>Pérez</td>
        <!-- Celda de datos para la columna de apellido -->
        <td>30</td>
        <!-- Celda de datos para la columna de edad -->
    </tr>
    <tr>
        <td>Ana</td> 
        <!-- Celda de datos para la columna de nombre -->
        <td>García</td>
        <!-- Celda de datos para la columna de apellido -->
        <td>25</td>
        <!-- Celda de datos para la columna de edad -->
    </tr>
    <tr>
        <td>Carlos</td> 
        <!-- Celda de datos para la columna de nombre -->
        <td>López</td>
        <!-- Celda de datos para la columna de apellido -->
        <td>28</td>
        <!-- Celda de datos para la columna de edad -->
    </tr>
</table>

<table border="1">
<caption>Paises y Capitales</caption>
<tr>

<th>Pais</th>
<th>Capital</th>
</tr>

<tr>
<td>España</td>
<td>Madrid
</td>
</tr>

<td>Francia</td>
<td>Paris</td>
</tr>
<tr>
<td>Italia</td>
<td>Roma</td>
</tr>
</table>

<td>Alemania</td> <td>180</td>
</tr>
<tr>
<td>Argentina</td> <td>150</td>
</tr>
</table>

<table border="1"> <!-- Tabla con celdas combinadas -->
<tr>
<th colspan="4">Mundial de Futbol</th> <!-- Celda
de encabezado que abarca dos columnas -->
</tr>
<tr>
<td rowspan="3">Paises con mayoría de goles</td>
<!-- Celda de datos que abarca dos filas -->
<td>Brasil 2</td> <td>230</td>
</tr>
<tr>
</body>
</html>
